<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario 2026 - Laboratorios</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .horario-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #0f172a;
        }
        .horario-header {
            padding: 15px 5%;
            background: #10243b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .btn-regresar {
            background: var(--secondary-color);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-regresar:hover {
            transform: translateX(-5px);
            background: #1d4ed8;
        }
        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
        }
        .header-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="horario-container">
        <header class="horario-header">
            <div class="header-title">Horario Académico 2026-I</div>
            <a href="index.html" class="btn-regresar">
                <span>&#10229;</span> Regresar al Inicio
            </a>
        </header>
        <iframe src="Horario-2026-1.pdf" type="application/pdf"></iframe>
    </div>
</body>
</html>
